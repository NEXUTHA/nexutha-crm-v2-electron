<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NEXUTHA AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; height: 100vh; padding: 16px; gap: 10px; }
    #header { display: flex; justify-content: space-between; align-items: center; }
    h2 { color: #00d4ff; font-size: 16px; }
    #save-badge { font-size: 11px; color: #00d4ff; background: rgba(0,212,255,0.1); padding: 3px 8px; border-radius: 10px; display: none; }
    #status { color: #aaa; font-size: 12px; }
    #progress { width: 100%; height: 4px; background: #333; border-radius: 2px; }
    #progress-bar { height: 4px; background: #00d4ff; border-radius: 2px; width: 0%; transition: width 0.3s; }
    #save-banner { background: #222; border: 1px solid #00d4ff44; border-radius: 10px; padding: 14px; display: none; }
    #save-banner p { font-size: 13px; color: #ccc; margin-bottom: 10px; line-height: 1.6; }
    #save-banner .btn-row { display: flex; gap: 8px; }
    .btn-save-yes { background: #00d4ff; color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
    .btn-save-no { background: transparent; color: #aaa; border: 1px solid #444; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    #customer-select { background: #222; border: 1px solid #444; border-radius: 10px; padding: 14px; display: none; }
    #customer-select p { font-size: 13px; color: #ccc; margin-bottom: 10px; }
    #customer-list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; margin-bottom: 10px; }
    .customer-item { background: #2a2a2a; border: 1px solid #333; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .customer-item:hover { border-color: #00d4ff; color: #00d4ff; }
    #customer-select .btn-row { display: flex; gap: 8px; }
    #messages { flex: 1; overflow-y: auto; border: 1px solid #333; padding: 12px; border-radius: 8px; }
    .msg-user { text-align: right; margin: 8px 0; }
    .msg-user span { background: #00d4ff; color: #000; padding: 8px 12px; border-radius: 12px; display: inline-block; max-width: 80%; word-break: break-word; }
    .msg-ai { text-align: left; margin: 8px 0; }
    .msg-ai span { background: #333; padding: 8px 12px; border-radius: 12px; display: inline-block; max-width: 80%; word-break: break-word; white-space: pre-wrap; }
    #action-row { display: flex; gap: 8px; }
    .btn-action { background: transparent; border: 1px solid #444; color: #aaa; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-action:hover { border-color: #00d4ff; color: #00d4ff; }
    #input-area { display: flex; gap: 8px; }
    #input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 14px; }
    #send { padding: 10px 20px; background: #00d4ff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    #send:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="header">
    <h2>NEXUTHA AI チャット</h2>
    <span id="save-badge">💾 保存中</span>
  </div>
  <div id="status">AIを読み込み中...</div>
  <div id="progress"><div id="progress-bar"></div></div>

  <div id="save-banner">
    <p>💾 この会話を保存しますか？<br>
    <span style="font-size:11px;color:#777;">保存したデータはこのPC内にのみ保存され、外部には一切送信されません。</span></p>
    <div class="btn-row">
      <button class="btn-save-yes" onclick="chooseSave(true)" title="会話履歴をCRMのIndexedDBに自動保存します。設定画面から確認・削除できます。">保存する</button>
      <button class="btn-save-no" onclick="chooseSave(false)" title="保存しない場合、このウィンドウを閉じると会話は消えます。">保存しない</button>
    </div>
  </div>

  <div id="customer-select">
    <p>👤 誰のメモに保存しますか？</p>
    <div id="customer-list"></div>
    <div class="btn-row">
      <button class="btn-save-no" onclick="skipCustomer()">顧客に紐付けない</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="action-row">
    <button class="btn-action" id="btn-memo" style="display:none" onclick="saveToMemo()" title="この会話内容を選択した顧客のメモに貼り付けます">📋 メモに貼る</button>
    <button class="btn-action" id="btn-copy" onclick="copyChat()" title="会話内容をクリップボードにコピーします">📄 コピー</button>
  </div>

  <div id="input-area">
    <input id="input" type="text" placeholder="メッセージを入力..." disabled />
    <button id="send" disabled>送信</button>
  </div>

  <script type="module">
    import * as webllm from './node_modules/@mlc-ai/web-llm/lib/index.js';

    const status = document.getElementById('status');
    const progressBar = document.getElementById('progress-bar');
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    let engine;
    let doSave = false;
    let selectedCustomer = null;
    let chatHistory = [];
    let modelName = 'Llama-3.2-1B-Instruct-q4f32_1-MLC';
    let levelNum = 1;

    const levelMap = {
      'Llama-3.2-1B-Instruct-q4f32_1-MLC': { label: 'LEVEL 1 · LITE', level: 1 },
      'Llama-3.2-3B-Instruct-q4f32_1-MLC': { label: 'LEVEL 2 · STANDARD', level: 2 },
      'Llama-3.1-8B-Instruct-q4f32_1-MLC': { label: 'LEVEL 3 · PRO', level: 3 },
      'Llama-3.3-70B-Instruct-q4f32_1-MLC': { label: 'LEVEL 4 · ULTRA', level: 4 },
    };

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = role === 'user' ? 'msg-user' : 'msg-ai';
      div.innerHTML = `<span>${text}</span>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      if (doSave) saveToIndexedDB();
    }

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('nexutha_ai', 1);
        req.onupgradeneeded = e => {
          e.target.result.createObjectStore('ai_chats', { keyPath: 'id' });
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = reject;
      });
    }

    async function saveToIndexedDB() {
      const db = await openDB();
      const tx = db.transaction('ai_chats', 'readwrite');
      const store = tx.objectStore('ai_chats');
      store.put({
        id: 'chat_current',
        modelName,
        levelLabel: levelMap[modelName]?.label || modelName,
        customerId: selectedCustomer?.id || null,
        customerName: selectedCustomer?.name || null,
        messages: chatHistory,
        updatedAt: new Date().toISOString()
      });
    }

    window.chooseSave = function(yes) {
      doSave = yes;
      document.getElementById('save-banner').style.display = 'none';
      if (yes) {
        document.getElementById('save-badge').style.display = 'block';
        loadCustomers();
      }
    };

    async function loadCustomers() {
      document.getElementById('customer-select').style.display = 'block';
      const list = document.getElementById('customer-list');
      list.innerHTML = '<div style="font-size:12px;color:#777;">読み込み中...</div>';
      try {
        const res = await fetch('http://localhost:9876/api/customers');
        const data = await res.json();
        const customers = data.customers || data;
        list.innerHTML = '';
        customers.slice(0, 10).forEach(c => {
          const item = document.createElement('div');
          item.className = 'customer-item';
          item.textContent = c.name + (c.company ? ` (${c.company})` : '');
          item.onclick = () => selectCustomer(c);
          list.appendChild(item);
        });
        if (customers.length === 0) {
          list.innerHTML = '<div style="font-size:12px;color:#777;">顧客が登録されていません</div>';
        }
      } catch(e) {
        list.innerHTML = '<div style="font-size:12px;color:#777;">顧客リストを取得できませんでした</div>';
      }
    }

    window.selectCustomer = function(customer) {
      selectedCustomer = customer;
      document.getElementById('customer-select').style.display = 'none';
      document.getElementById('save-badge').textContent = `💾 ${customer.name}`;
      document.getElementById('btn-memo').style.display = 'block';
      addMessage('ai', `${customer.name}さんのメモに会話を保存します。`);
    };

    window.skipCustomer = function() {
      document.getElementById('customer-select').style.display = 'none';
    };

    window.saveToMemo = async function() {
      if (!selectedCustomer) return;
      if (chatHistory.length === 0) {
        alert('会話がありません。');
        return;
      }
      const btn = document.getElementById('btn-memo');
      btn.textContent = '🤔 要約中...';
      btn.disabled = true;

      // AIに要約させる
      const summaryPrompt = '以下の会話履歴から「ユーザー」の発言だけに注目してください。AIの返答は無視してください。ユーザーが話した内容から顧客の特徴・要望・予算・時期・注意点など重要な情報だけを箇条書きでまとめてください。AIの説明や機能説明は含めないでください。\n\n会話内容:\n' +
        chatHistory.map(m => `${m.role === 'user' ? 'ユーザー' : 'AI'}: ${m.content}`).join('\n');

      try {
        const reply = await engine.chat.completions.create({
          messages: [
            { role: 'system', content: '必ず日本語で答えてください。顧客メモの要約を作成するアシスタントです。' },
            { role: 'user', content: summaryPrompt }
          ],
          stream: false,
        });
        const summary = reply.choices[0].message.content;
        btn.textContent = '📋 メモに貼る';
        btn.disabled = false;
        showSummaryConfirm(summary);
      } catch(e) {
        btn.textContent = '📋 メモに貼る';
        btn.disabled = false;
        alert('要約に失敗しました: ' + e.message);
      }
    };

    function showSummaryConfirm(summary) {
      // 既存の確認ダイアログを削除
      const existing = document.getElementById('summary-dialog');
      if (existing) existing.remove();

      const dialog = document.createElement('div');
      dialog.id = 'summary-dialog';
      dialog.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;';
      dialog.innerHTML = `
        <div style="background:#222;border:1px solid #00d4ff44;border-radius:12px;padding:20px;width:100%;max-width:500px;">
          <div style="font-size:13px;font-weight:600;color:#00d4ff;margin-bottom:12px;">📋 AI要約 - ${selectedCustomer.name}さんのメモ</div>
          <textarea id="summary-text" style="width:100%;height:160px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:10px;border-radius:8px;font-size:13px;font-family:sans-serif;resize:vertical;box-sizing:border-box;">${summary}</textarea>
          <div style="font-size:11px;color:#777;margin:8px 0 12px;">内容を確認・編集してから保存してください。</div>
          <div style="display:flex;gap:8px;">
            <button onclick="confirmSaveMemo()" style="background:#00d4ff;color:#000;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:13px;">保存する</button>
            <button onclick="document.getElementById('summary-dialog').remove()" style="background:transparent;color:#aaa;border:1px solid #444;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;">キャンセル</button>
          </div>
        </div>
      `;
      document.body.appendChild(dialog);
    }

    window.confirmSaveMemo = async function() {
      const summary = document.getElementById('summary-text').value.trim();
      if (!summary) return;
      const date = new Date().toLocaleString('ja-JP');
      const currentMemo = selectedCustomer.memo || '';
      const newMemo = currentMemo + (currentMemo ? '\n\n' : '') + `--- AI要約 ${date} ---\n` + summary;
      try {
        const res = await fetch('http://localhost:9876/api/customers/' + selectedCustomer.id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...selectedCustomer, memo: newMemo })
        });
        if (res.ok) {
          document.getElementById('summary-dialog').remove();
          selectedCustomer.memo = newMemo;
          addMessage('ai', `✅ ${selectedCustomer.name}さんのメモに保存しました。`);
        } else {
          alert('保存に失敗しました');
        }
      } catch(e) {
        alert('エラー: ' + e.message);
      }
    };

    window.copyChat = function() {
      const text = chatHistory.map(m => `${m.role === 'user' ? 'あなた' : 'AI'}: ${m.content}`).join('\n');
      navigator.clipboard.writeText(text);
      document.getElementById('btn-copy').textContent = '✅ コピー済み';
      setTimeout(() => document.getElementById('btn-copy').textContent = '📄 コピー', 2000);
    };

    async function init() {
      try {
        const params = new URLSearchParams(window.location.search);
        modelName = params.get('model') || 'Llama-3.2-1B-Instruct-q4f32_1-MLC';
        const info = levelMap[modelName] || { label: modelName, level: 1 };
        levelNum = info.level;
        document.querySelector('h2').textContent = 'NEXUTHA AI · ' + info.label;
        engine = await webllm.CreateMLCEngine(modelName, {
          initProgressCallback: (p) => {
            status.textContent = p.text;
            progressBar.style.width = (p.progress * 100) + '%';
          }
        });
        status.textContent = 'AI準備完了！';
        input.disabled = false;
        send.disabled = false;
        addMessage('ai', 'こんにちは！何でも聞いてください。');
        document.getElementById('save-banner').style.display = 'block';
      } catch (e) {
        status.textContent = 'エラー: ' + e.message;
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      send.disabled = true;

      chatHistory.push({ role: 'user', content: text });
      addMessage('user', text);
      addMessage('ai', '考え中...');

      let systemPrompt = '必ず日本語で答えてください。あなたはNEXUTHA CRMのサポートAIです。';
      if (levelNum >= 3 && selectedCustomer === null) {
        systemPrompt += '会話の中で顧客名が出てきた場合は「〇〇さんのメモに保存しますか？」と確認してください。';
      }

      const reply = await engine.chat.completions.create({
        messages: [
          { role: 'system', content: systemPrompt },
          ...chatHistory
        ],
        stream: false,
      });

      const aiText = reply.choices[0].message.content;
      chatHistory.push({ role: 'assistant', content: aiText });
      const lastMsg = messages.lastElementChild;
      lastMsg.querySelector('span').textContent = aiText;
      send.disabled = false;
    }

    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.isComposing && !send.disabled) sendMessage(); });

    init();
  </script>
</body>
</html>
